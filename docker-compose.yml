services:
  app:
    build: .
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://pacific:pacific_secret@db:5432/pacific_fish
      - AUTH_SECRET=2jgaP1roiNZ31LGbs3i5bgsoEERVjcHJqOaqTOpEUKk=
      - AUTH_URL=http://localhost:3000
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: pacific
      POSTGRES_PASSWORD: pacific_secret
      POSTGRES_DB: pacific_fish
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pacific -d pacific_fish']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
