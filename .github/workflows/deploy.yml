name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_seed:
        description: 'Run database seed'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RUN_SEED: ${{ inputs.run_seed || 'false' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push migrator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: migrator
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migrator

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,RUN_SEED
          script: |
            cd /opt/pacific-fish
            set -a && source .env && set +a
            printf 'services:\n  app:\n    environment:\n      - AUTH_SECRET=%s\n' "${AUTH_SECRET}" > docker-compose.override.yml
            docker compose pull app
            docker pull ${REGISTRY}/${IMAGE_NAME}:migrator
            docker run --rm --network pacific-fish_default -e DATABASE_URL="postgresql://pacific:${POSTGRES_PASSWORD}@db:5432/pacific_fish" ${REGISTRY}/${IMAGE_NAME}:migrator npx prisma migrate deploy
            if [ "$RUN_SEED" = "true" ]; then
              docker run --rm --network pacific-fish_default -e DATABASE_URL="postgresql://pacific:${POSTGRES_PASSWORD}@db:5432/pacific_fish" ${REGISTRY}/${IMAGE_NAME}:migrator npx prisma db seed || true
            fi
            docker compose up -d --no-deps app
            docker image prune -f
